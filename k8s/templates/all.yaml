{{- define "frontend-service.labels" -}}
app: frontend
{{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend-rollout
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {app: frontend}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
        - name: frontend-cont
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  strategy:
    blueGreen: 
      activeService: frontend-svc
      previewService: frontend-svc-preview
---
apiVersion: v1
kind: Service
metadata: {name: frontend-svc}
spec:
  ports: [{port: 80, targetPort: 80}]
  selector: {app: frontend}
---
apiVersion: v1
kind: Service
metadata: {name: frontend-svc-preview}
spec:
  ports: [{port: 80, targetPort: 80}]
  selector: {app: frontend}
